        return numA - numB; // 升序（改为numB - numA则降序）

    */

    aTagList.sort((a, b) => {
        const getPriority = (el) => {
            const href = el.href;

<script>
$(document).ready(function() {
    const $targetDd = $('.prdocuts_wrapper .newNarrowBy dd'); 
    console.log('✅ 选中的dd元素数量：', $targetDd.length);
    console.log('✅ 选中的dd元素详情：', $targetDd);
    const aTagList = $targetDd.find('a').toArray();

    // ========== 示例2：按href中「attr_xxx」的数字升序/降序 ==========
    // 取消下面注释即可启用，替换示例1的排序逻辑
    aTagList.sort((a, b) => {
        // 提取href中attr_后的数字（适配你截图中的href格式）
        const getAttrNumber = (el) => {
            const match = el.href.match(/attr_(\d+)/);
            return match ? parseInt(match[1], 10) : 0;
        };
        const numA = getAttrNumber(a);
        const numB = getAttrNumber(b);
        return numA - numB; // 升序（改为numB - numA则降序）
    });

    $targetDd.empty();
    aTagList.forEach(aTag => $targetDd.append(aTag));
});
</script>
