<style>
.snowflake {
    position: fixed;
    top: -10px;
    color: #E3F2FD;
    font-size: 1em;
    user-select: none;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.8;
}

body {
    overflow-x: hidden;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const snowflakeCount = 50;
    const snowflakeContainer = document.createElement('div');
    snowflakeContainer.className = 'snowflakes';
    document.body.appendChild(snowflakeContainer);

    for (let i = 0; i < snowflakeCount; i++) {
        createSnowflake();
    }

    function createSnowflake() {
        const snowflake = document.createElement('div');
        snowflake.innerHTML = '❄';
        snowflake.className = 'snowflake';
        
        const startX = Math.random() * window.innerWidth;
        const size = Math.random() * 0.8 + 0.7;
        const duration = Math.random() * 10 + 10;
        const delay = Math.random() * 5;
        
        snowflake.style.left = startX + 'px';
        snowflake.style.fontSize = size + 'em';
        snowflake.style.opacity = Math.random() * 0.6 + 0.4;
        
        snowflakeContainer.appendChild(snowflake);
        
        animateSnowflake(snowflake, startX, duration, delay);
    }

    function animateSnowflake(element, startX, duration, delay) {
        let startTime = null;
        const amplitude = Math.random() * 100 + 50;
        const period = Math.random() * 2 + 1;
        
        function animate(currentTime) {
            if (!startTime) startTime = currentTime;
            const elapsed = currentTime - startTime;
            const progress = (elapsed / 1000 - delay) / duration;
            
            if (progress < 1) {
                const x = startX + Math.sin(progress * Math.PI * period) * amplitude;
                const y = progress * (window.innerHeight + 20);
                
                element.style.transform = `translate(${x}px, ${y}px)`;
                element.style.opacity = 1 - progress * 0.5;
                
                requestAnimationFrame(animate);
            } else {
                element.remove();
                createSnowflake();
            }
        }
        
        setTimeout(() => {
            requestAnimationFrame(animate);
        }, delay * 1000);
    }

    // 调整窗口大小后重新初始化
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            document.querySelectorAll('.snowflake').forEach(el => el.remove());
            for (let i = 0; i < snowflakeCount; i++) {
                createSnowflake();
            }
        }, 250);
    });
});
</script>
