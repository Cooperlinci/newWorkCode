<script>
$(document).ready(function() {
    const productNameSelector = '.ly_poster_106 .poster_box .item_box .i_title';
    $(productNameSelector).each(function() {
        const $this = $(this);
        const originalText = $this.text().trim();
        const testRegex = /\b(Test)\b(.*)/;
        if (testRegex.test(originalText)) {
            const newText = originalText.replace(testRegex, '$1\n$2').trim();
            $this.text(newText);
            $this.css({
                'white-space': 'pre-line',
                'display': 'block',
                'text-align': 'center',
                'line-height': '1.4'
            });
        }
    });
});
</script>


<script>
$(document).ready(function() {
    if (window.innerWidth > 1000) {
        const productNameSelector = '.ly_poster_106 .poster_box .item_box .i_title';
        $(productNameSelector).each(function() {
            const $this = $(this);
            const originalText = $this.text().trim();
            const testWordRegex = /\bTest\b/;
            if (testWordRegex.test(originalText)) {
                let newText = '';
                const isTestStart = /^\s*Test\b/.test(originalText);
                if (isTestStart) {
                    newText = originalText.replace(/\b(Test)\b(.*)/, '$1\n$2').trim();
                } else {
                    newText = originalText.replace(/\b(Test)\b/, '\n$1').trim();
                }
                $this.text(newText);
                $this.css({
                    'white-space': 'pre-line',
                    'display': 'block',
                    'text-align': 'center',
                    'line-height': '1.4'
                });
            }
        });
    }
});
</script>

<script>
$(document).ready(function() {
    if (window.innerWidth > 1000) {
        $('.ly_poster_106 .poster_box .item_box .i_title').each(function() {
            const $this = $(this);
            const txt = $this.text().trim();
            if (/Test/.test(txt)) {
                $this.text(
                    txt.startsWith('Test') 
                        ? txt.replace('Test', 'Test\n')
                        : txt.replace('Test', '\nTest')
                ).css({
                    'white-space': 'pre-line',
                    'display': 'block',
                    'text-align': 'center',
                    'line-height': '1.4'
                });
            }
        });
    }
});
</script>
