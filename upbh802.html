<script>
$(document).ready(function() {
    const CONTAINER_SELECTOR = '.ly_footer_43 .wide .default_foot_menu_style .menu_list.menu_list_menu';
    const DL_TARGET_INDEX = 0;
    const KEEP_FROM_INDEX = 4;
    const INSERT_POSITION = 'after'; 
    const $container = $(CONTAINER_SELECTOR);
    const $originalDl = $container.find('dl').eq(DL_TARGET_INDEX);
    if (!$originalDl.length || !$originalDl.find('dd').length) {
        return;
    }
    const $clonedDl = $originalDl.clone(true);
    $clonedDl.addClass('dl_list2');
    $clonedDl.find('dd').each(function(index) {
        if (index < KEEP_FROM_INDEX) {
            $(this).remove();
        }
    });
    if (!$clonedDl.find('dd').length) {
        return;
    }
    if (INSERT_POSITION === 'after') {
        $originalDl.after($clonedDl);
    } else if (INSERT_POSITION === 'before') {
        $originalDl.before($clonedDl);
    } else if (INSERT_POSITION === 'appendTo') {
        $container.append($clonedDl);
    }
});
</script>
